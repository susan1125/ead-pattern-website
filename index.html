<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆图纸生成器</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #2c3e50;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 40px rgba(0,0,0,.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f0f2f5 100%);
    min-height: 100vh;
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 20px;
  }
  .header .icon {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -.02em;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 15px;
    margin-top: 4px;
  }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  /* Upload Area */
  .upload-area {
    border: 2px dashed #cbd5e1;
    border-radius: var(--radius-sm);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: #fafbfc;
    position: relative;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--primary);
    background: #eef2ff;
  }
  .upload-area.has-image {
    padding: 16px;
  }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .upload-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 10px;
  }
  .upload-text {
    font-size: 15px;
    color: var(--text-secondary);
  }
  .upload-text strong {
    color: var(--primary);
  }
  .upload-hint {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 6px;
  }
  .preview-thumb {
    max-width: 200px;
    max-height: 150px;
    border-radius: 8px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  /* Controls Row */
  .controls-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 16px;
  }
  .controls-row label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .size-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .size-btn {
    padding: 8px 16px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all .2s;
    white-space: nowrap;
  }
  .size-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }
  .size-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 2px 8px rgba(99,102,241,.35);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(99,102,241,.45);
  }
  .btn-outline {
    background: #fff;
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  .btn-outline:hover {
    background: #eef2ff;
  }
  .btn:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Result Sections */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 20px;
    background: linear-gradient(180deg, #6366f1, #a855f7);
    border-radius: 2px;
  }

  .image-preview-wrap {
    text-align: center;
  }
  .image-preview-wrap img {
    max-width: 100%;
    max-height: 300px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
  }

  .grid-canvas-wrap {
    text-align: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .grid-canvas-wrap canvas {
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    max-width: 100%;
    height: auto;
  }

  /* Legend */
  .legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: #f8fafc;
    border-radius: 8px;
    font-size: 13px;
  }
  .legend-swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
    flex-shrink: 0;
  }
  .legend-code {
    font-weight: 700;
    font-size: 11px;
    color: #6366f1;
    background: #eef2ff;
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .legend-name {
    font-weight: 500;
    flex: 1;
    min-width: 0;
    font-size: 13px;
  }
  .legend-count {
    color: var(--text-secondary);
    font-size: 12px;
    white-space: nowrap;
  }

  /* Border Detail */
  .border-section {
    margin-bottom: 16px;
  }
  .border-label {
    font-weight: 700;
    font-size: 13px;
    color: #f97316;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .border-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: #f97316;
    border-radius: 50%;
  }
  .border-beads {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .border-bead {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px;
    white-space: nowrap;
  }
  .border-bead .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .border-bead .code {
    font-weight: 700;
    color: #6366f1;
  }
  .border-bead .pos {
    color: #94a3b8;
    font-size: 10px;
  }
  .border-col-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .border-col-list .border-bead {
    width: fit-content;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .stats-bar span {
    background: #f1f5f9;
    padding: 4px 12px;
    border-radius: 12px;
  }
  .stats-bar strong {
    color: var(--primary);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #94a3b8;
  }
  .empty-state .big-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    padding: 20px 0 0;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px 12px 40px; }
    .card { padding: 16px; }
    .header { padding: 20px 0 12px; }
    .header h1 { font-size: 22px; }
    .controls-row { flex-direction: column; align-items: flex-start; }
    .legend-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }

  /* Fade-in animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card {
    animation: fadeInUp .4s ease-out;
  }

  .hidden { display: none !important; }

  /* Shop Mode */
  .shop-header-name { font-size: 28px; font-weight: 700; color: var(--primary); }
  .shop-header-slogan { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }
  .shop-logo-img { max-width: 80px; max-height: 80px; border-radius: 12px; margin-bottom: 4px; }

  .shop-settings-toggle { position: fixed; top: 16px; right: 16px; z-index: 999;
    width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 22px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .shop-settings-toggle:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,.2); }

  .shop-panel-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center; }
  .shop-panel { background: #fff; border-radius: var(--radius); padding: 28px 24px;
    max-width: 460px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .shop-panel h3 { font-size: 18px; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .shop-field { margin-bottom: 16px; }
  .shop-field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .shop-field input, .shop-field select { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; transition: all .2s; }
  .shop-field input:focus, .shop-field select:focus { outline: none; border-color: var(--primary); }
  .shop-field-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .shop-panel-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-danger { background: #fff; color: #ef4444; border: 2px solid #ef4444; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-success { background: #22c55e; color: #fff; border: none; }
  .shop-footer { text-align: center; font-size: 12px; color: #94a3b8; padding: 20px 0 0; }
  .shop-footer-contact { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 6px; font-size: 13px; }
  .shop-footer-contact span { color: var(--primary); }

  /* 色板弹窗 */
  .swatch-overlay { position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center; }
  .swatch-panel { background:#fff;border-radius:16px;padding:16px;max-width:370px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .swatch-panel h4 { font-size:14px;margin-bottom:10px;color:#2c3e50; }
  .swatch-grid { display:grid;grid-template-columns:repeat(10,1fr);gap:3px; }
  .swatch-cell { aspect-ratio:1;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .1s; }
  .swatch-cell:hover,.swatch-cell.active { border-color:#6366f1;transform:scale(1.2);z-index:1;box-shadow:0 2px 8px rgba(0,0,0,.15); }
  .swatch-close { float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:0 4px;line-height:1; }
</style>
</head>
<body>

<div class="container">

  <!-- Shop Settings Toggle -->
  <button class="shop-settings-toggle" id="shopSettingsToggle" title="店铺设置">⚙️</button>

  <!-- Shop Settings Panel -->
  <div class="shop-panel-overlay hidden" id="shopPanelOverlay">
    <div class="shop-panel">
      <h3>🏪 店铺定制</h3>
      <div class="shop-field">
        <label>店铺Logo（URL或上传图片）</label>
        <input type="text" id="shopLogo" placeholder="留空则显示默认 🧩 图标">
        <div class="shop-field-hint">输入图片URL，或粘贴图床链接</div>
      </div>
      <div class="shop-field">
        <label>店铺名称</label>
        <input type="text" id="shopName" placeholder="拼豆图纸生成器">
      </div>
      <div class="shop-field">
        <label>副标题/标语</label>
        <input type="text" id="shopSlogan" placeholder="上传图片，自动生成像素化拼豆图纸">
      </div>
      <div class="shop-field">
        <label>联系人/门店</label>
        <input type="text" id="shopContact" placeholder="如：张老板 📞138xxxx">
      </div>
      <div class="shop-field">
        <label>地址/微信</label>
        <input type="text" id="shopAddress" placeholder="如：XX市XX路XX号 微信：xxx">
      </div>
      <div class="shop-field">
        <label>页面主题色</label>
        <select id="shopTheme">
          <option value="6366f1">默认紫蓝</option>
          <option value="f97316">活力橙</option>
          <option value="22c55e">清新绿</option>
          <option value="ec4899">甜美粉</option>
          <option value="3b82f6">天空蓝</option>
          <option value="a855f7">梦幻紫</option>
          <option value="14b8a6">蒂芙尼蓝</option>
          <option value="ef4444">热情红</option>
        </select>
      </div>
      <div class="shop-panel-actions">
        <button class="btn btn-success" id="shopSaveBtn">✅ 应用</button>
        <button class="btn btn-outline" id="shopExportBtn">📤 导出配置</button>
        <button class="btn btn-outline" id="shopImportBtn" onclick="document.getElementById('shopImportFile').click()">📥 导入配置</button>
        <input type="file" id="shopImportFile" accept=".json" class="hidden">
        <button class="btn btn-outline" id="shopCopyLinkBtn">🔗 复制专属链接</button>
        <button class="btn btn-outline" id="shopResetBtn">🔄 恢复默认</button>
        <button class="btn btn-danger" id="shopCloseBtn">✕ 取消</button>
      </div>
      <div class="shop-field" style="margin-top:12px;background:#f0fdf4;border-radius:10px;padding:10px 14px;font-size:12px;color:#166534;display:none;" id="shopLinkCopied">
        ✅ 专属链接已复制！发送给老板，打开即显示他们的店铺信息。
      </div>
      <div class="shop-field" style="margin-top:12px;background:#eff6ff;border-radius:10px;padding:10px 14px;font-size:11px;color:#1e40af;" id="shopUrlPreview">
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header" id="shopHeader">
    <img class="shop-logo-img hidden" id="shopLogoImg" alt="logo">
    <span class="icon" id="shopIcon">🧩</span>
    <h1 class="shop-header-name" id="shopHeaderName">拼豆图纸生成器</h1>
    <p class="shop-header-slogan" id="shopHeaderSlogan">上传图片，自动生成像素化拼豆图纸</p>
  </div>

  <!-- Upload & Settings Card -->
  <div class="card">
    <div class="upload-area" id="uploadArea">
      <span class="upload-icon" id="uploadIcon">📷</span>
      <span class="upload-text" id="uploadText"><strong>点击上传</strong> 或拖拽图片到这里</span>
      <span class="upload-hint">支持 JPG / PNG / WebP / GIF</span>
      <img class="preview-thumb hidden" id="uploadPreview" alt="预览">
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls-row">
      <label>网格密度：</label>
      <div class="size-options" id="sizeOptions">
        <button class="size-btn" data-size="30">30×30</button>
        <button class="size-btn active" data-size="50">50×50</button>
        <button class="size-btn" data-size="80">80×80</button>
        <button class="size-btn" data-size="100">100×100</button>
        <button class="size-btn" data-size="150">150×150</button>
        <button class="size-btn" data-size="200">200×200</button>
      </div>
      <input type="number" id="customSize" placeholder="自定义"
        style="width:68px;padding:6px 8px;border:2px solid #e2e8f0;border-radius:20px;font-size:13px;text-align:center;"
        min="10" max="300" value="50">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-left:4px;">
        <input type="checkbox" id="ditherToggle" checked style="width:16px;height:16px;cursor:pointer;">
        抖色优化
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-left:4px;">
        <input type="checkbox" id="removeBgToggle" style="width:16px;height:16px;cursor:pointer;">
        去背景
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin-left:4px;">
        <input type="checkbox" id="keepRatioToggle" style="width:16px;height:16px;cursor:pointer;">
        保持比例
      </label>
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:4px;">简化：</label>
      <select id="simplifyLevel" style="padding:6px 8px;border:2px solid #e2e8f0;border-radius:20px;font-size:12px;background:#fff;cursor:pointer;">
        <option value="0">不限制</option>
        <option value="24">24色</option>
        <option value="16" selected>16色</option>
        <option value="12">12色</option>
        <option value="8">8色</option>
        <option value="5">5色</option>
      </select>
      <select id="bgTolerance" style="padding:4px 6px;border:2px solid #e2e8f0;border-radius:14px;font-size:11px;background:#fff;cursor:pointer;display:none;">
        <option value="30">低</option>
        <option value="50" selected>中</option>
        <option value="80">高</option>
        <option value="120">超高</option>
      </select>
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:4px;">缩放：</label>
      <select id="zoomLevel" style="padding:6px 8px;border:2px solid #e2e8f0;border-radius:20px;font-size:12px;background:#fff;cursor:pointer;">
        <option value="0.8">80%</option>
        <option value="1" selected>100%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
        <option value="3">300%</option>
      </select>
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:6px;">网格线：</label>
      <input type="color" id="gridLineColor" value="#d4d4d8"
        style="width:30px;height:30px;border:2px solid #cbd5e1;border-radius:50%;cursor:pointer;padding:0;"
        title="网格线颜色">
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:8px;">大格线：</label>
      <span id="majorGridPalette" style="display:inline-flex;gap:4px;align-items:center;">
      </span>
      <input type="number" id="majorGridCustom" value="8" min="2" max="100"
        style="width:52px;padding:5px 4px;border:2px solid #e2e8f0;border-radius:16px;font-size:12px;text-align:center;display:none;">
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:8px;">大格色：</label>
      <span id="majorGridColorPalette" style="display:inline-flex;gap:4px;align-items:center;"></span>
      <span id="majorGridHSV" class="hidden" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;margin-left:4px;">
        <input type="range" id="majorH" min="0" max="360" value="248" style="width:80px;height:6px;-webkit-appearance:none;background:linear-gradient(to right,red,yellow,lime,cyan,blue,magenta,red);border-radius:3px;">
        <input type="range" id="majorS" min="0" max="100" value="74" style="width:60px;height:6px;">
        <input type="range" id="majorV" min="0" max="100" value="95" style="width:60px;height:6px;">
        <button id="majorHSVClose" style="font-size:12px;padding:2px 6px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;">✕</button>
      </span>
      <span id="majorGridColorBtn" style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:2px solid #cbd5e1;border-radius:50%;cursor:pointer;font-weight:bold;color:#6366f1;font-size:16px;transition:all .15s;" title="自定义大格线颜色">+</span>
      <label style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;margin-left:8px;">边框色：</label>
      <input type="color" id="borderColorCustom" value="#f1f5f9"

  // 通过采样生成子色板（均匀覆盖色彩空间）
  function createSubPalette(count) {
    if (count >= FULL_PALETTE.length) return FULL_PALETTE.slice();
    // 按色相排序后等距采样，保证色彩覆盖均匀
    const sorted = FULL_PALETTE.map((b, i) => {
      // 简易色相近似（0-360 映射到 0-6）
      const r = b.r / 255, g = b.g / 255, bl = b.b / 255;
      const max = Math.max(r, g, bl), min = Math.min(r, g, bl);
      let hue = 0;
      if (max !== min) {
        if (max === r) hue = ((g - bl) / (max - min) + 6) % 6;
        else if (max === g) hue = (bl - r) / (max - min) + 2;
        else hue = (r - g) / (max - min) + 4;
      }
      return { ...b, hue: hue * 60, lightness: (max + min) / 2 };
    }).sort((a, b) => a.hue - b.hue || a.lightness - b.lightness);
    // 等距采样
    const step = sorted.length / count;
    const result = [];
    for (let i = 0; i < count; i++) {
      result.push(sorted[Math.floor(i * step)]);
    }
    return result;
  }

  function hexToHsv(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;let max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h=0,s=max===0?0:d/max,v=max;if(d){if(max===r)h=((g-b)/d+6)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;}return{h:Math.round(h),s:Math.round(s*100),v:Math.round(v*100)};}

    uploadArea.classList.remove('drag-over');
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      loadImage(file);
    }
  });

  function loadImage(file) {
    if (!file.type.startsWith('image/')) {
      alert('请上传图片文件（JPG / PNG / WebP / GIF）');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        currentImage = img;
        // 显示缩略图
        uploadPreview.src = ev.target.result;
        uploadPreview.classList.remove('hidden');
        uploadIcon.classList.add('hidden');
        uploadText.innerHTML = '<strong>点击更换图片</strong>';
        uploadArea.classList.add('has-image');
        // 生成图纸
        generatePattern();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ============ 生成拼豆图纸 ============
  function generatePattern() {
    if (!currentImage) return;

    const img = currentImage;
    const imgRatio = img.width / img.height;
    let cols, rows;
    if (keepRatioToggle.checked) {
      // 保持原图比例：长边 = currentGridSize，短边按比例
      if (imgRatio >= 1) { cols = currentGridSize; rows = Math.max(2, Math.round(currentGridSize / imgRatio)); }
      else { rows = currentGridSize; cols = Math.max(2, Math.round(currentGridSize * imgRatio)); }
    } else {
      cols = currentGridSize; rows = currentGridSize;
    }

    // 步骤1：将图片缩放至 cols×rows
    const offCanvas = document.createElement('canvas');
    offCanvas.width = cols;
    offCanvas.height = rows;
    const offCtx = offCanvas.getContext('2d');
    // 使用 imageSmoothingEnabled 获得更准确的缩放
    offCtx.imageSmoothingEnabled = true;
    offCtx.imageSmoothingQuality = 'high';
    offCtx.drawImage(img, 0, 0, cols, rows);
    const imageData = offCtx.getImageData(0, 0, cols, rows);
    const totalCells = cols * rows;

    // 步骤2：将每个像素映射到最接近的拼豆色（Floyd-Steinberg 抖动可选）
    const grid = [];
    const colorCounts = new Map();
    const pixels = imageData.data;
    const useDither = ditherToggle.checked;

    // 复制像素数据到浮点数组（用于误差扩散）
    const srcR = new Float32Array(totalCells);
    const srcG = new Float32Array(totalCells);
    const srcB = new Float32Array(totalCells);

    for (let i = 0; i < totalCells; i++) {
      const idx = i * 4;
      const a = pixels[idx + 3];
      if (a < 128) {
        srcR[i] = 255; srcG[i] = 255; srcB[i] = 255;
      } else {
        srcR[i] = pixels[idx];
        srcG[i] = pixels[idx + 1];
        srcB[i] = pixels[idx + 2];
      }
    }

    // 背景检测：采样四边像素，找主色
    let bgR = -1, bgG = -1, bgB = -1, bgTol = 50;
    if (removeBgToggle.checked) {
      bgTol = parseInt(bgTolerance.value);
      const edgePixels = [];
      for (let i = 0; i < Math.max(cols, rows); i++) {
        if (i < cols) { const t=i,b=(rows-1)*cols+i; edgePixels.push([srcR[t],srcG[t],srcB[t]],[srcR[b],srcG[b],srcB[b]]); }
        if (i < rows) { const l=i*cols,r=i*cols+cols-1; edgePixels.push([srcR[l],srcG[l],srcB[l]],[srcR[r],srcG[r],srcB[r]]); }
      }
      // 找最常见的边缘色
      const colorMap = new Map();
      edgePixels.forEach(([r,g,b]) => {
        const key = Math.round(r/30)*30 + ',' + Math.round(g/30)*30 + ',' + Math.round(b/30)*30;
        colorMap.set(key, (colorMap.get(key)||0) + 1);
      });
      let maxCount = 0, bestKey = '';
      colorMap.forEach((v,k) => { if(v>maxCount){maxCount=v;bestKey=k;} });
      [bgR, bgG, bgB] = bestKey.split(',').map(Number);
    }

    for (let row = 0; row < rows; row++) {
      const rowData = [];
      for (let c = 0; c < cols; c++) {
        const i = row * cols + c;
        let rr = Math.max(0, Math.min(255, Math.round(srcR[i])));
        let gg = Math.max(0, Math.min(255, Math.round(srcG[i])));
        let bb = Math.max(0, Math.min(255, Math.round(srcB[i])));
        // 去背景：靠近边缘主色的像素 → 白色
        if (bgR >= 0) {
          const dr = rr - bgR, dg = gg - bgG, db = bb - bgB;
          if (dr*dr + dg*dg + db*db < bgTol * bgTol) {
            rr = 255; gg = 255; bb = 255;
          }
        }

        const bead = findClosestBead(rr, gg, bb);
        rowData.push(bead);
        const key = bead.hex;
        colorCounts.set(key, (colorCounts.get(key) || 0) + 1);

        // Floyd-Steinberg 误差扩散
        if (useDither) {
          const errR = rr - bead.r;
          const errG = gg - bead.g;
          const errB = bb - bead.b;

          if (c + 1 < cols) {
            const ni = row * cols + (c + 1);
            srcR[ni] += errR * 7/16;
            srcG[ni] += errG * 7/16;
            srcB[ni] += errB * 7/16;
          }
          if (row + 1 < rows) {
            if (c - 1 >= 0) {
              const ni = (row + 1) * cols + (c - 1);
              srcR[ni] += errR * 3/16;
              srcG[ni] += errG * 3/16;
              srcB[ni] += errB * 3/16;
            }
            const ni = (row + 1) * cols + c;
            srcR[ni] += errR * 5/16;
            srcG[ni] += errG * 5/16;
            srcB[ni] += errB * 5/16;
            if (c + 1 < cols) {
              const ni = (row + 1) * cols + (c + 1);
              srcR[ni] += errR * 1/16;
              srcG[ni] += errG * 1/16;
              srcB[ni] += errB * 1/16;
            }
          }
        }
      }
      grid.push(rowData);
    }

    // 颜色简化：限制最大颜色数量
    const maxColors = parseInt(simplifyLevel.value);
    if (maxColors > 0 && colorCounts.size > maxColors) {
      // 按数量排序，保留前 maxColors 种颜色
      const sorted = [...colorCounts.entries()].sort((a,b) => b[1] - a[1]);
      const keepHex = new Set(sorted.slice(0, maxColors).map(e => e[0]));
      const keepBeads = activePalette.filter(b => keepHex.has(b.hex));
      // 把不要的颜色映射到最近保留色
      const mergeMap = new Map();
      for (const [hex] of sorted.slice(maxColors)) {
        const bead = activePalette.find(b => b.hex === hex);
        if (!bead) continue;
        let minD = Infinity, best = keepBeads[0];
        for (const kb of keepBeads) {
          const d = colorDistance(bead.r, bead.g, bead.b, kb.r, kb.g, kb.b);
          if (d < minD) { minD = d; best = kb; }
        }
        mergeMap.set(hex, best.hex);
      }
      // 重建网格和计数
      const newCounts = new Map();
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const orig = grid[r][c].hex;
          const mapped = mergeMap.get(orig) || orig;
          if (mapped !== orig) grid[r][c] = activePalette.find(b => b.hex === mapped);
          newCounts.set(mapped, (newCounts.get(mapped) || 0) + 1);
        }
      }
      colorCounts.clear();
      newCounts.forEach((v,k) => colorCounts.set(k,v));
    }

    currentGridData = { grid, colorCounts, cols, rows };

    // 渲染
    renderGrid(grid, cols, rows);
    renderLegend(colorCounts);

    // 显示结果区
    resultsSection.classList.remove('hidden');
    emptyState.classList.add('hidden');
    originalImage.src = currentImage.src;

    // 更新统计
    statGrid.textContent = `${cols}×${rows}`;
    statColors.textContent = colorCounts.size;
    statTotal.textContent = totalCells;
  }

  // ============ 通用网格线绘制 ============
  function drawAllGridLines(ctx, ox, oy, gridPxX, gridPxY, cols, rows, cellSize) {
    const gridColor = getGridLineColor();
    if (gridColor === null) return;
    const maxDim = Math.max(cols, rows);
    // 细线 - 竖线
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = cellSize > 10 ? 1 : 0.5;
    ctx.beginPath();
    for (let i = 0; i <= cols; i++) {
      const pos = ox + i * cellSize;
      ctx.moveTo(pos + 0.5, oy); ctx.lineTo(pos + 0.5, oy + gridPxY);
    }
    // 细线 - 横线
    for (let i = 0; i <= rows; i++) {
      const yPos = oy + i * cellSize;
      ctx.moveTo(ox, yPos + 0.5); ctx.lineTo(ox + gridPxX, yPos + 0.5);
    }
    ctx.stroke();
    // 大格粗线
    const majorN = getMajorGridN();
    if (majorN > 0 && maxDim >= majorN) {
      ctx.strokeStyle = activeMajorColor;
      ctx.lineWidth = Math.max(2, cellSize > 10 ? 2.5 : 1.5);
      ctx.beginPath();
      for (let i = 0; i <= cols; i += majorN) {
        const pos = ox + i * cellSize;
        ctx.moveTo(pos, oy); ctx.lineTo(pos, oy + gridPxY);
      }
      for (let i = 0; i <= rows; i += majorN) {
        const yPos = oy + i * cellSize;
        ctx.moveTo(ox, yPos); ctx.lineTo(ox + gridPxX, yPos);
      }
      ctx.stroke();
    }
  }

  // ============ 渲染网格 ============
  function renderGrid(grid, cols, rows) {
    const isMobile = window.innerWidth < 768;
    // 高清渲染：用 devicePixelRatio 避免模糊
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const zoom = parseFloat(zoomLevel.value);
    const baseWidth = isMobile ? 700 : 1000;
    const displayWidth = Math.round(baseWidth * zoom);
    const displayCellSize = Math.max(14, Math.floor(displayWidth / Math.max(cols, rows)));
    const showLabels = Math.max(cols, rows) <= 80;
    const labelSize = showLabels ? 32 : 0;
    const gridPxX = cols * displayCellSize;
    const logicalW = labelSize + gridPxX;
    const logicalH = labelSize + gridPxY;

    const canvas = gridCanvas;
    canvas.width = logicalW * dpr;
    canvas.height = logicalH * dpr;
    canvas.style.width = logicalW + 'px';
    canvas.style.height = logicalH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 高清缩放
    ctx.imageSmoothingEnabled = false;

    // 白色背景
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, logicalW, logicalH);

    const ox = labelSize, oy = labelSize;

    // 绘制每个格子
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const bead = grid[row][col];
        ctx.fillStyle = bead.hex;
        ctx.fillRect(ox + col * displayCellSize, oy + row * displayCellSize, displayCellSize, displayCellSize);
      }
    }

    // 绘制网格线
    drawAllGridLines(ctx, ox, oy, gridPxX, gridPxY, cols, rows, displayCellSize);

    // 行列标号
    if (showLabels) {
      // 标签区域背景色
      if (borderColor.value !== 'transparent') {
        ctx.fillStyle = borderColor.value;
        ctx.fillRect(0, 0, logicalW, oy);       // 顶部列号区
        ctx.fillRect(0, 0, ox, logicalH);        // 左侧行号区
      }
      // 标签区分隔线
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let i = 0; i <= cols; i++) {
        const x = ox + i * displayCellSize;
        ctx.moveTo(x, 0); ctx.lineTo(x, oy);
      }
      for (let i = 0; i <= rows; i++) {
        const y = oy + i * displayCellSize;
        ctx.moveTo(0, y); ctx.lineTo(ox, y);
      }
      ctx.stroke();

      ctx.fillStyle = '#64748b';
      const labelFont = Math.max(8, Math.min(11, displayCellSize - 1));
      ctx.font = `bold ${labelFont}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 列号 (顶部)
      for (let col = 0; col < cols; col++) {
        const cx = ox + col * displayCellSize + displayCellSize / 2;
        ctx.fillText(String(col + 1), cx, oy / 2);
      }

      // 行号 (左侧)
      ctx.textAlign = 'center';
      for (let row = 0; row < rows; row++) {
        const cy = oy + row * displayCellSize + displayCellSize / 2;
        ctx.fillText(String(row + 1), ox / 2, cy);
      }
    }
  }

  // ============ 渲染图例 ============
  function renderLegend(colorCounts) {
    // 按数量降序排列
    const entries = [];
    for (const [hex, count] of colorCounts) {
      const def = FULL_PALETTE.find(b => b.hex === hex);
      entries.push({ ...def, count });
    }
    entries.sort((a, b) => b.count - a.count);

    legendGrid.innerHTML = entries.map(e => `
      <div class="legend-item">
        <div class="legend-swatch" style="background:${e.hex}"></div>
        <span class="legend-code">${e.code}</span>
        <span class="legend-name">${e.name}</span>
        <span class="legend-count">×${e.count}</span>
      </div>
    `).join('');
  }

  // ============ 导出 PNG ============
  exportBtn.addEventListener('click', () => {
    if (!currentGridData) return;

    const { grid, colorCounts, cols, rows } = currentGridData;

    // 根据网格密度自适应格子大小，确保编号可读
    const maxDim = Math.max(cols, rows);
    let cellSize, fontSize;
    if (maxDim <= 40)       { cellSize = 64; fontSize = 20; }
    else if (maxDim <= 60)  { cellSize = 48; fontSize = 16; }
    else if (maxDim <= 80)  { cellSize = 40; fontSize = 13; }
    else if (maxDim <= 120) { cellSize = 32; fontSize = 11; }
    else                    { cellSize = 26; fontSize = 9; }

    const showCodes = cellSize >= 20; // 格子太小就不写编号
    const showExportLabels = true; // 导出始终带坐标
    const exportLabelSize = showExportLabels ? 34 : 0;
    const lineWidth = 1;
    const gridPxX = cols * cellSize;
    const gridPxY = rows * cellSize;

    // 图例区
    const legendEntries = [];
    for (const [hex, count] of colorCounts) {
      const def = FULL_PALETTE.find(b => b.hex === hex);
      legendEntries.push({ ...def, count });
    }
    legendEntries.sort((a, b) => b.count - a.count);

    const legendCols = 8;
    const legendRows = Math.ceil(legendEntries.length / legendCols);
    const legendItemW = 130;
    const legendItemH = 28;
    const legendPad = 20;
    const legendW = legendCols * legendItemW + legendPad * 2;
    const legendH = legendRows * legendItemH + legendPad * 2 + 40; // 40 for title

    // 标题区
    const titleH = 50;
    const labelPad = showExportLabels ? exportLabelSize : 0;
    const totalW = Math.max(labelPad + Math.max(gridPxX, gridPxY), legendW);
    const totalH = titleH + labelPad + Math.max(gridPxX, gridPxY) + 12 + legendH;

    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = totalW;
    exportCanvas.height = totalH;
    const ctx = exportCanvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // 白色背景
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, totalW, totalH);

    // ---- 标题 ----
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 22px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`拼豆图纸  ${cols}×${rows}  |  用色 ${colorCounts.size} 种  |  总豆数 ${cols*rows}`, 20, 34);

    // ---- 网格 ----
    const offsetX = Math.floor((totalW - labelPad - gridPxX) / 2) + labelPad;
    const gridY = titleH + labelPad;

    // 辅助函数：判断文字颜色
    function getTextColor(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 140 ? '#1a1a1a' : '#ffffff';
    }

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const bead = grid[row][col];
        const x = offsetX + col * cellSize;
        const y = gridY + row * cellSize;

        ctx.fillStyle = bead.hex;
        ctx.fillRect(x, y, cellSize, cellSize);

        // 写入编号
        if (showCodes) {
          ctx.fillStyle = getTextColor(bead.hex);
          ctx.font = `bold ${fontSize}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(bead.code, x + cellSize/2, y + cellSize/2);
        }
      }
    }

    // 网格线（跟随开关）
    drawAllGridLines(ctx, offsetX, gridY, gridPxX, gridPxY, cols, rows, cellSize);

    // 行列坐标标签
    if (showExportLabels) {
      // 标签区背景
      if (borderColor.value !== 'transparent') {
        ctx.fillStyle = borderColor.value;
        ctx.fillRect(offsetX - exportLabelSize, gridY - exportLabelSize, gridPxX + exportLabelSize, exportLabelSize);
        ctx.fillRect(offsetX - exportLabelSize, gridY - exportLabelSize, exportLabelSize, gridPxY + exportLabelSize);
      }
      // 标签区分隔线
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 0.5; ctx.beginPath();
      for (let i = 0; i <= cols; i++) {
        const x = offsetX - exportLabelSize + i * cellSize;
        ctx.moveTo(x, gridY - exportLabelSize); ctx.lineTo(x, gridY);
      }
      for (let i = 0; i <= rows; i++) {
        const y = gridY - exportLabelSize + i * cellSize;
        ctx.moveTo(offsetX - exportLabelSize, y); ctx.lineTo(offsetX, y);
      }
      ctx.stroke();

      const labelFont = Math.max(9, Math.min(14, cellSize - 2));
      ctx.fillStyle = '#374151';
      ctx.font = `bold ${labelFont}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 列号（顶部）
      for (let col = 0; col < cols; col++) {
        const cx = offsetX + col * cellSize + cellSize / 2;
        const cy = gridY - exportLabelSize / 2;
        ctx.fillText(String(col + 1), cx, cy);
      }

      // 行号（左侧）
      for (let row = 0; row < rows; row++) {
        const cx = offsetX - exportLabelSize / 2;
        const cy = gridY + row * cellSize + cellSize / 2;
        ctx.fillText(String(row + 1), cx, cy);
      }
    }

    // ---- 图例 ----
    const legendY = gridY + Math.max(gridPxX, gridPxY) + 12;
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 16px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('色卡图例', legendPad, legendY + 28);

    const legendStartY = legendY + 44;
    for (let i = 0; i < legendEntries.length; i++) {
      const e = legendEntries[i];
      const lx = legendPad + (i % legendCols) * legendItemW;
      const ly = legendStartY + Math.floor(i / legendCols) * legendItemH;

      // 色块
      ctx.fillStyle = e.hex;
      ctx.fillRect(lx, ly, 22, 22);
      ctx.strokeStyle = getGridLineColor() || '#d4d4d8';
      ctx.strokeRect(lx, ly, 22, 22);

      // 编号
      ctx.fillStyle = '#6366f1';
      ctx.font = 'bold 10px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(e.code, lx + 26, ly);

      // 名称
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '11px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillText(`${e.name} ×${e.count}`, lx + 26, ly + 12);
    }

    // 触发下载
    exportCanvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `拼豆图纸_${cols}x${rows}_MARD色号.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  // ============ 保存到手机相册 ============
  saveToPhoneBtn.addEventListener('click', () => {
    if (!currentGridData) return;

    const { grid, cols, rows } = currentGridData;
    // 高分辨率导出，手机上更清晰
    const cellSize = Math.max(cols,rows) <= 50 ? 56 : (Math.max(cols,rows) <= 80 ? 42 : (Math.max(cols,rows) <= 120 ? 32 : 24));
    const labelSize = 34;
    const gridPxX = cols * cellSize;
    const gridPxY = rows * cellSize;
    const canvasW = labelSize + gridPxX;
    const canvasH = labelSize + gridPxY;

    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');

    // 白底
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvasW, canvasH);

    const ox = labelSize, oy = labelSize;

    // 画格子
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const bead = grid[row][col];
        ctx.fillStyle = bead.hex;
        ctx.fillRect(ox + col * cellSize, oy + row * cellSize, cellSize, cellSize);
        // 编号
        if (cellSize >= 20) {
          const r = parseInt(bead.hex.slice(1,3), 16);
          const g = parseInt(bead.hex.slice(3,5), 16);
          const b = parseInt(bead.hex.slice(5,7), 16);
          ctx.fillStyle = (r*299 + g*587 + b*114)/1000 > 140 ? '#1a1a1a' : '#ffffff';
          ctx.font = `bold ${Math.max(8, cellSize*0.38)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(bead.code, ox + col * cellSize + cellSize/2, oy + row * cellSize + cellSize/2);
        }
      }
    }

    // 网格线
    drawAllGridLines(ctx, ox, oy, gridPxX, gridPxY, cols, rows, cellSize);

    // 坐标
    if (borderColor.value !== 'transparent') {
      ctx.fillStyle = borderColor.value;
      ctx.fillRect(0, 0, ox + gridPxX, oy);
      ctx.fillRect(0, 0, ox, oy + gridPxY);
    }
    ctx.fillStyle = '#374151';
    const labelFont = Math.max(10, cellSize - 2);
    ctx.font = `bold ${labelFont}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // 标签区分隔线
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 0.5; ctx.beginPath();
    for (let i = 0; i <= cols; i++) {
      ctx.moveTo(ox + i*cellSize, 0); ctx.lineTo(ox + i*cellSize, oy);
    }
    for (let i = 0; i <= rows; i++) {
      ctx.moveTo(0, oy + i*cellSize); ctx.lineTo(ox, oy + i*cellSize);
    }
    ctx.stroke();
    for (let col = 0; col < cols; col++) {
      ctx.fillText(String(col+1), ox + col*cellSize + cellSize/2, oy - labelSize/2);
    }
    for (let row = 0; row < rows; row++) {
      ctx.fillText(String(row+1), ox - labelSize/2, oy + row*cellSize + cellSize/2);
    }

    // 生成 blob 并触发下载/分享
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);

      // 尝试 Web Share API（iOS/Android 可直接保存到相册）
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], `拼豆图纸_${cols}x${rows}.png`, { type: 'image/png' });
        const shareData = { files: [file], title: '拼豆图纸' };
        if (navigator.canShare(shareData)) {
          navigator.share(shareData).catch(() => fallbackDownload());
          return;
        }
      }
      fallbackDownload();

      function fallbackDownload() {
        // 打开图片预览，长按即可保存到相册
        const win = window.open('');
        if (win) {
          win.document.write(`<!DOCTYPE html>
            <html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
            <title>长按保存图片</title>
            <style>*{margin:0;padding:0;background:#222;}
            img{width:100%;display:block;}
            p{color:#fff;text-align:center;padding:12px;font-size:14px;font-family:sans-serif;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.8);z-index:1;}</style></head>
            <body>
            <p>👆 长按图片 → 保存到相册</p>
            <img src="${url}" alt="拼豆图纸">
            </body></html>`);
          win.document.close();
        } else {
          // 降级：直接下载
          const a = document.createElement('a');
          a.href = url;
          a.download = `拼豆图纸_${cols}x${rows}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
      }
    }, 'image/png');
  });

  // ============ 复制文字图纸 ============
  copyTextBtn.addEventListener('click', () => {
    if (!currentGridData) return;

    const { grid, cols, rows } = currentGridData;
    const lines = [];

    for (let row = 0; row < rows; row++) {
      const codes = [];
      for (let col = 0; col < cols; col++) {
        codes.push(grid[row][c].code);
      }
      lines.push(`第${String(row + 1).padStart(3, ' ')}行: ${codes.join(' ')}`);
    }

    const text = `MARD 拼豆图纸 ${cols}×${rows}\n${'='.repeat(40)}\n${lines.join('\n')}\n${'='.repeat(40)}\n共 ${cols*rows} 颗豆子`;

    navigator.clipboard.writeText(text).then(() => {
      // 临时提示
      const origText = copyTextBtn.textContent;
      copyTextBtn.textContent = '✅ 已复制！';
      copyTextBtn.style.background = '#22c55e';
      copyTextBtn.style.color = '#fff';
      copyTextBtn.style.borderColor = '#22c55e';
      setTimeout(() => {
        copyTextBtn.textContent = origText;
        copyTextBtn.style.background = '';
        copyTextBtn.style.color = '';
        copyTextBtn.style.borderColor = '';
      }, 1500);
    }).catch(() => {
      alert('复制失败，请手动复制');
    });
  });

  // ============ 复制边框清单 ============
  copyBorderBtn.addEventListener('click', () => {
    if (!currentGridData) return;

    const { grid, cols, rows } = currentGridData;
    const lines = [];
    let totalBeads = 0;

    lines.push(`MARD 拼豆边框清单 ${cols}×${rows}`);
    lines.push('═'.repeat(50));
    lines.push('');

    // 上边框（第1行）
    lines.push('【上边框 — 第 1 行】');
    const topRow = [];
    for (let col = 0; col < cols; col++) {
      topRow.push(`${grid[0][col].code}`);
      totalBeads++;
    }
    lines.push(topRow.join(' '));
    lines.push('');

    // 下边框（最后一行）
    lines.push(`【下边框 — 第 ${rows} 行】`);
    const bottomRow = [];
    for (let col = 0; col < cols; col++) {
      bottomRow.push(`${grid[rows-1][c].code}`);
      totalBeads++;
    }
    lines.push(bottomRow.join(' '));
    lines.push('');

    // 左边框（第1列，跳过首尾行）
    if (rows > 2) {
      lines.push('【左边框 — 第 1 列】（不含四角）');
      const leftCol = [];
      for (let row = 1; row < rows - 1; row++) {
        leftCol.push(`第${row+1}行: ${grid[row][0].code}`);
        totalBeads++;
      }
      lines.push(leftCol.join('  '));
      lines.push('');
    }

    // 右边框（最后一列，跳过首尾行）
    if (rows > 2) {
      lines.push(`【右边框 — 第 ${cols} 列】（不含四角）`);
      const rightCol = [];
      for (let row = 1; row < rows - 1; row++) {
        rightCol.push(`第${row+1}行: ${grid[row][cols-1].code}`);
        totalBeads++;
      }
      lines.push(rightCol.join('  '));
      lines.push('');
    }

    lines.push('═'.repeat(50));
    lines.push(`边框共计 ${totalBeads} 颗豆子（网格 ${cols}×${rows} = ${cols*rows} 颗）`);

    const text = lines.join('\n');

    navigator.clipboard.writeText(text).then(() => {
      const origText = copyBorderBtn.textContent;
      copyBorderBtn.textContent = '✅ 已复制！';
      copyBorderBtn.style.background = '#f97316';
      copyBorderBtn.style.color = '#fff';
      copyBorderBtn.style.borderColor = '#f97316';
      setTimeout(() => {
        copyBorderBtn.textContent = origText;
        copyBorderBtn.style.background = '';
        copyBorderBtn.style.color = '';
        copyBorderBtn.style.borderColor = '';
      }, 1500);
    }).catch(() => {
      alert('复制失败，请手动复制');
    });
  });

  // ============ 店铺定制 ============
  const SHOP_DEFAULTS = {
    logo: '', name: '拼豆图纸生成器', slogan: '上传图片，自动生成像素化拼豆图纸',
    contact: '', address: '', theme: '6366f1'
  };

  // DOM refs for shop
  const shopToggle = document.getElementById('shopSettingsToggle');
  const shopOverlay = document.getElementById('shopPanelOverlay');
  const shopNameInp = document.getElementById('shopName');
  const shopSloganInp = document.getElementById('shopSlogan');
  const shopLogoInp = document.getElementById('shopLogo');
  const shopContactInp = document.getElementById('shopContact');
  const shopAddressInp = document.getElementById('shopAddress');
  const shopThemeSel = document.getElementById('shopTheme');
  const shopHeaderName = document.getElementById('shopHeaderName');
  const shopHeaderSlogan = document.getElementById('shopHeaderSlogan');
  const shopIcon = document.getElementById('shopIcon');
  const shopLogoImg = document.getElementById('shopLogoImg');
  const shopFooter = document.getElementById('shopFooter');
  const shopFooterContact = document.getElementById('shopFooterContact');

  function loadShopSettings() {
    try {
      const raw = localStorage.getItem('bead-shop-settings');
      return raw ? { ...SHOP_DEFAULTS, ...JSON.parse(raw) } : { ...SHOP_DEFAULTS };
    } catch(e) { return { ...SHOP_DEFAULTS }; }
  }

  function saveShopSettings(s) {
    try { localStorage.setItem('bead-shop-settings', JSON.stringify(s)); } catch(e) {}
  }

  function applyShopSettings(s) {
    // Header
    shopHeaderName.textContent = s.name || SHOP_DEFAULTS.name;
    shopHeaderSlogan.textContent = s.slogan || SHOP_DEFAULTS.slogan;
    // Logo
    if (s.logo && s.logo.trim()) {
      shopLogoImg.src = s.logo.trim();
      shopLogoImg.classList.remove('hidden');
      shopIcon.classList.add('hidden');
    } else {
      shopLogoImg.classList.add('hidden');
      shopIcon.classList.remove('hidden');
    }
    // Theme
    const themeColor = s.theme || SHOP_DEFAULTS.theme;
    document.documentElement.style.setProperty('--primary', '#' + themeColor);
    document.documentElement.style.setProperty('--primary-hover', '#' + themeColor + 'dd');
    // Forms
    shopNameInp.value = s.name || '';
    shopSloganInp.value = s.slogan || '';
    shopLogoInp.value = s.logo || '';
    shopContactInp.value = s.contact || '';
    shopAddressInp.value = s.address || '';
    shopThemeSel.value = s.theme || SHOP_DEFAULTS.theme;
    // Footer
    if (s.contact || s.address) {
      const parts = [];
      if (s.contact) parts.push('👤 ' + s.contact);
      if (s.address) parts.push('📍 ' + s.address);
      shopFooterContact.innerHTML = parts.map(p => '<span>' + p + '</span>').join('');
      shopFooterContact.classList.remove('hidden');
    } else {
      shopFooterContact.classList.add('hidden');
    }
    // Page title
    document.title = (s.name || SHOP_DEFAULTS.name) + ' - 拼豆图纸生成器';
  }

  // init
  let currentShopSettings = loadShopSettings();
  applyShopSettings(currentShopSettings);

  // Toggle panel
  shopToggle.addEventListener('click', () => shopOverlay.classList.remove('hidden'));
  document.getElementById('shopCloseBtn').addEventListener('click', () => shopOverlay.classList.add('hidden'));
  shopOverlay.addEventListener('click', (e) => {
    if (e.target === shopOverlay) shopOverlay.classList.add('hidden');
  });

  // Save
  document.getElementById('shopSaveBtn').addEventListener('click', () => {
    const s = {
      logo: shopLogoInp.value.trim(),
      name: shopNameInp.value.trim(),
      slogan: shopSloganInp.value.trim(),
      contact: shopContactInp.value.trim(),
      address: shopAddressInp.value.trim(),
      theme: shopThemeSel.value,
    };
    saveShopSettings(s);
    applyShopSettings(s);
    shopOverlay.classList.add('hidden');
  });

  // Reset
  document.getElementById('shopResetBtn').addEventListener('click', () => {
    if (!confirm('确定恢复默认设置吗？')) return;
    saveShopSettings({ ...SHOP_DEFAULTS });
    applyShopSettings({ ...SHOP_DEFAULTS });
    shopOverlay.classList.add('hidden');
  });

  // Export
  document.getElementById('shopExportBtn').addEventListener('click', () => {
    const s = loadShopSettings();
    const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (s.name || '拼豆') + '-店铺配置.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // Import
  document.getElementById('shopImportFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        saveShopSettings(s);
        applyShopSettings(s);
        alert('✅ 配置已导入！');
        shopOverlay.classList.add('hidden');
      } catch(err) { alert('❌ 文件格式错误'); }
    };
    reader.readAsText(file);
  });

  // Copy shareable URL
  function buildShopUrl(s) {
    const params = new URLSearchParams();
    if (s.name && s.name !== SHOP_DEFAULTS.name) params.set('name', s.name);
    if (s.slogan && s.slogan !== SHOP_DEFAULTS.slogan) params.set('slogan', s.slogan);
    if (s.logo) params.set('logo', s.logo);
    if (s.contact) params.set('contact', s.contact);
    if (s.address) params.set('address', s.address);
    if (s.theme && s.theme !== SHOP_DEFAULTS.theme) params.set('theme', s.theme);
    const base = location.origin + location.pathname;
    const qs = params.toString();
    return qs ? base + '?' + qs : base;
  }

  document.getElementById('shopCopyLinkBtn').addEventListener('click', () => {
    const s = loadShopSettings();
    const url = buildShopUrl(s);
    const preview = document.getElementById('shopUrlPreview');
    preview.innerHTML = '🔗 <strong>专属链接：</strong><br><code style="word-break:break-all;font-size:11px;">' + url + '</code>';
    preview.style.display = 'block';
    navigator.clipboard.writeText(url).then(() => {
      const el = document.getElementById('shopLinkCopied');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }).catch(() => {});
  });

  // ===== 管理员入口锁（暂开） =====
  const urlParams = new URLSearchParams(location.search);
  // 近期全部可见，等开始谈店再锁
  shopToggle.style.display = 'flex';

  // Load settings from URL params on startup (overrides localStorage)
  (function initFromUrl() {
    if ([...urlParams.keys()].length === 0) return;
    const urlSettings = {};
    if (urlParams.has('name')) urlSettings.name = urlParams.get('name');
    if (urlParams.has('slogan')) urlSettings.slogan = urlParams.get('slogan');
    if (urlParams.has('logo')) urlSettings.logo = urlParams.get('logo');
    if (urlParams.has('contact')) urlSettings.contact = urlParams.get('contact');
    if (urlParams.has('address')) urlSettings.address = urlParams.get('address');
    if (urlParams.has('theme')) urlSettings.theme = urlParams.get('theme');
    if (Object.keys(urlSettings).length > 0) {
      saveShopSettings(urlSettings);
      applyShopSettings(urlSettings);
    }
  })();

  // ============ 初始化 ============
  console.log('🧩 拼豆图纸生成器已就绪');
  console.log('  内置 MARD 融合豆 291 色拼豆色板');
  console.log('  支持 30–200 网格密度 + 自定义数值');
  console.log('  🏪 店铺定制模式：点击右上角 ⚙️ 设置');
  console.log('  上传图片即可开始！');
})();
</script>

<!-- 色板弹窗 -->
</body>
</html>
